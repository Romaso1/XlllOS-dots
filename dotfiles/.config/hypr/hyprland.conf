# This file sources other files in `hyprland` and `custom` folders
# You wanna add your stuff in files in `custom`

# --- Environment variables ---
source=hyprland/env.conf
# hyprlang noerror true
source=custom/env.conf
# hyprlang noerror false

# --- Other vars ---
source=hyprland/variables.conf
# hyprlang noerror true
source=custom/variables.conf
# hyprlang noerror false

# --- Defaults ---
# hyprlang if !dontLoadDefaultExecs
source=hyprland/execs.conf
# hyprlang endif
# hyprlang if !dontLoadDefaultGeneral
source=hyprland/general.conf
# hyprlang endif
# hyprlang if !dontLoadDefaultRules
source=hyprland/rules.conf
# hyprlang endif
# hyprlang if !dontLoadDefaultColors
source=hyprland/colors.conf
# hyprlang endif
# hyprlang if !dontLoadDefaultKeybinds
source=hyprland/keybinds.conf
# hyprlang endif

# --- Custom ---
# hyprlang noerror true
source=custom/execs.conf
# hyprlang noerror true
source=custom/general.conf
# hyprlang noerror true
source=custom/rules.conf
# hyprlang noerror true
source=custom/keybinds.conf
# hyprlang noerror false

# --- nwg-displays support ---
source=workspaces.conf
source=monitors.conf

# --- Shell overrides ---
source=hyprland/shellOverrides/main.conf

source = ~/.config/hypr/desktop-widgets.conf

source = ~/.config/hypr/custom/lsfg-vk-wayland.conf



















# BEGIN XlllOS Flatpak Bottles all-floating native-size rules
# Flatpak Bottles / Wine / .exe windows
# Goal:
# - Bottles main window opens floating
# - Windows apps launched through Bottles open floating
# - windows keep their own app-defined/native size
# - no forced size
# - no persistent_size
#
# IMPORTANT:
# These rules intentionally do NOT use "size", "minsize", "maxsize", or "persistent_size".

# Bottles main window
windowrule = match:class ^(com\.usebottles\.bottles)$, float on, center on
windowrule = match:title ^(Bottles)$, float on, center on

# Wine/Bottles helper classes
windowrule = match:class ^(wine)$, float on, center on, fullscreen_state 0 0, sync_fullscreen off, suppress_event fullscreen maximize
windowrule = match:class ^(wine64)$, float on, center on, fullscreen_state 0 0, sync_fullscreen off, suppress_event fullscreen maximize
windowrule = match:class ^(steam_proton)$, float on, center on, fullscreen_state 0 0, sync_fullscreen off, suppress_event fullscreen maximize
windowrule = match:class ^(explorer\.exe)$, float on, center on, fullscreen_state 0 0, sync_fullscreen off, suppress_event fullscreen maximize
windowrule = match:class ^(rundll32\.exe)$, float on, center on, fullscreen_state 0 0, sync_fullscreen off, suppress_event fullscreen maximize
windowrule = match:class ^(wineboot\.exe)$, float on, center on, fullscreen_state 0 0, sync_fullscreen off, suppress_event fullscreen maximize
windowrule = match:class ^(winecfg\.exe)$, float on, center on, fullscreen_state 0 0, sync_fullscreen off, suppress_event fullscreen maximize

# Steam/login helpers if launched inside Wine/Bottles
windowrule = match:class ^(steamwebhelper\.exe)$, float on, center on, fullscreen_state 0 0, sync_fullscreen off, suppress_event fullscreen maximize
windowrule = match:class ^(steam\.exe)$, float on, center on, fullscreen_state 0 0, sync_fullscreen off, suppress_event fullscreen maximize

# All normal .exe windows from Wine/Bottles
# No size here: each app keeps its own native opening size.
windowrule = match:class ^(.*\.exe)$, float on, center on, fullscreen_state 0 0, sync_fullscreen off, suppress_event fullscreen maximize

# Common installer/login titles
windowrule = match:title ^(Войти в Steam)$, float on, center on, fullscreen_state 0 0, sync_fullscreen off, suppress_event fullscreen maximize
windowrule = match:title ^(Steam Sign In)$, float on, center on, fullscreen_state 0 0, sync_fullscreen off, suppress_event fullscreen maximize
windowrule = match:title ^(Sign in to Steam)$, float on, center on, fullscreen_state 0 0, sync_fullscreen off, suppress_event fullscreen maximize
windowrule = match:title ^(Steam Login)$, float on, center on, fullscreen_state 0 0, sync_fullscreen off, suppress_event fullscreen maximize
windowrule = match:title ^(.*Установка.*)$, float on, center on, fullscreen_state 0 0, sync_fullscreen off, suppress_event fullscreen maximize
windowrule = match:title ^(.*Steam Setup.*)$, float on, center on, fullscreen_state 0 0, sync_fullscreen off, suppress_event fullscreen maximize
windowrule = match:title ^(.*Installer.*)$, float on, center on, fullscreen_state 0 0, sync_fullscreen off, suppress_event fullscreen maximize
windowrule = match:title ^(.*Setup.*)$, float on, center on, fullscreen_state 0 0, sync_fullscreen off, suppress_event fullscreen maximize
# END XlllOS Flatpak Bottles all-floating native-size rules
