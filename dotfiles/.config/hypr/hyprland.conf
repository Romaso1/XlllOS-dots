# This file sources other files in `hyprland` and `custom` folders
# You wanna add your stuff in files in `custom`

# --- Environment variables ---
source=hyprland/env.conf
# hyprlang noerror true
source=custom/env.conf
# hyprlang noerror false

# --- Other vars ---
source=hyprland/variables.conf
# hyprlang noerror true
source=custom/variables.conf
# hyprlang noerror false

# --- Defaults ---
# hyprlang if !dontLoadDefaultExecs
source=hyprland/execs.conf
# hyprlang endif
# hyprlang if !dontLoadDefaultGeneral
source=hyprland/general.conf
# hyprlang endif
# hyprlang if !dontLoadDefaultRules
source=hyprland/rules.conf
# hyprlang endif
# hyprlang if !dontLoadDefaultColors
source=hyprland/colors.conf
# hyprlang endif
# hyprlang if !dontLoadDefaultKeybinds
source=hyprland/keybinds.conf
# hyprlang endif

# --- Custom ---
# hyprlang noerror true
source=custom/execs.conf
# hyprlang noerror true
source=custom/general.conf
# hyprlang noerror true
source=custom/rules.conf
# hyprlang noerror true
source=custom/keybinds.conf
# hyprlang noerror false

# --- nwg-displays support ---
source=workspaces.conf
source=monitors.conf

# --- Shell overrides ---
source=hyprland/shellOverrides/main.conf

source = ~/.config/hypr/desktop-widgets.conf

source = ~/.config/hypr/custom/lsfg-vk-wayland.conf
















# BEGIN XlllOS Flatpak Bottles floating rules
# Flatpak Bottles main window - possible classes/titles
windowrule = match:class ^(com\.usebottles\.bottles)$, float on, center on
windowrule = match:class ^(Bottles)$, float on, center on
windowrule = match:title ^(Bottles)$, float on, center on
windowrule = match:title ^(.*Bottles.*)$, float on, center on

# Wine / Bottles helper windows
windowrule = match:class ^(wine)$, float on, center on
windowrule = match:class ^(wine64)$, float on, center on
windowrule = match:class ^(explorer\.exe)$, float on, center on
windowrule = match:class ^(rundll32\.exe)$, float on, center on
windowrule = match:class ^(wineboot\.exe)$, float on, center on
windowrule = match:class ^(winecfg\.exe)$, float on, center on
windowrule = match:class ^(msiexec\.exe)$, float on, center on

# All Windows .exe apps launched through Bottles
windowrule = match:class ^(.*\.exe)$, float on, center on

# Common installer/setup windows
windowrule = match:title ^(.*Setup.*)$, float on, center on
windowrule = match:title ^(.*Installer.*)$, float on, center on
windowrule = match:title ^(.*Установка.*)$, float on, center on
# END XlllOS Flatpak Bottles floating rules
