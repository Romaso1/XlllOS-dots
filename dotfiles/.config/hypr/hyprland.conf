# This file sources other files in `hyprland` and `custom` folders
# You wanna add your stuff in files in `custom`

# --- Environment variables ---
source=hyprland/env.conf
# hyprlang noerror true
source=custom/env.conf
# hyprlang noerror false

# --- Other vars ---
source=hyprland/variables.conf
# hyprlang noerror true
source=custom/variables.conf
# hyprlang noerror false

# --- Defaults ---
# hyprlang if !dontLoadDefaultExecs
source=hyprland/execs.conf
# hyprlang endif
# hyprlang if !dontLoadDefaultGeneral
source=hyprland/general.conf
# hyprlang endif
# hyprlang if !dontLoadDefaultRules
source=hyprland/rules.conf
# hyprlang endif
# hyprlang if !dontLoadDefaultColors
source=hyprland/colors.conf
# hyprlang endif
# hyprlang if !dontLoadDefaultKeybinds
source=hyprland/keybinds.conf
# hyprlang endif

# --- Custom ---
# hyprlang noerror true
source=custom/execs.conf
# hyprlang noerror true
source=custom/general.conf
# hyprlang noerror true
source=custom/rules.conf
# hyprlang noerror true
source=custom/keybinds.conf
# hyprlang noerror false

# --- nwg-displays support ---
source=workspaces.conf
source=monitors.conf

# --- Shell overrides ---
source=hyprland/shellOverrides/main.conf

source = ~/.config/hypr/desktop-widgets.conf

source = ~/.config/hypr/custom/lsfg-vk-wayland.conf








# BEGIN XlllOS Bottles Wine floating rules
# Bottles / Wine windows - own app size, floating
windowrule = match:class ^(com\.usebottles\.bottles)$, float on, center on
windowrule = match:title ^(Bottles)$, float on, center on

# Wine / Steam installer - prevent forced fullscreen, keep app size
windowrule = match:class ^(steam_proton)$, float on, fullscreen_state "0 0", sync_fullscreen off, center on
windowrule = match:title ^(.*Установка Steam.*)$, float on, fullscreen_state "0 0", sync_fullscreen off, center on
windowrule = match:title ^(.*Steam Setup.*)$, float on, fullscreen_state "0 0", sync_fullscreen off, center on
windowrule = match:title ^(.*Setup.*)$, float on, fullscreen_state "0 0", sync_fullscreen off, center on
windowrule = match:title ^(.*Installer.*)$, float on, fullscreen_state "0 0", sync_fullscreen off, center on
windowrule = match:class ^(wine)$, float on, fullscreen_state "0 0", sync_fullscreen off, center on
windowrule = match:class ^(explorer.exe)$, float on, fullscreen_state "0 0", sync_fullscreen off, center on
# END XlllOS Bottles Wine floating rules

# BEGIN XlllOS Bottles Wine fullscreen fix
# Extra fix: prevent Wine/Bottles helper windows from opening fullscreen/maximized
windowrule = match:class ^(com\.usebottles\.bottles)$, float on, center on, fullscreen_state 0 0, suppress_event fullscreen maximize, persistent_size on
windowrule = match:class ^(steam_proton)$, float on, center on, fullscreen_state 0 0, suppress_event fullscreen maximize, persistent_size on
windowrule = match:class ^(wine)$, float on, center on, fullscreen_state 0 0, suppress_event fullscreen maximize, persistent_size on
windowrule = match:class ^(explorer\.exe)$, float on, center on, fullscreen_state 0 0, suppress_event fullscreen maximize, persistent_size on
windowrule = match:title ^(.*Установка Steam.*)$, float on, center on, fullscreen_state 0 0, suppress_event fullscreen maximize, persistent_size on
windowrule = match:title ^(.*Steam Setup.*)$, float on, center on, fullscreen_state 0 0, suppress_event fullscreen maximize, persistent_size on
windowrule = match:title ^(.*Installer.*)$, float on, center on, fullscreen_state 0 0, suppress_event fullscreen maximize, persistent_size on
# END XlllOS Bottles Wine fullscreen fix
