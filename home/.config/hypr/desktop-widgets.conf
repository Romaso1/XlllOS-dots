# XlllOS desktop widgets - separate tiled Kitty windows, workspace 1 only

exec-once = bash -lc 'sleep 8; ~/.config/hypr/scripts/desktop-widgets.sh'

dwindle {
preserve_split = true
use_active_for_splits = true
default_split_ratio = 1.0
}

windowrule = tile on, match:class ^(xlll-bonsai|xlll-clock|xlll-aquarium|xlll-matrix)$
windowrule = workspace 1 silent, match:class ^(xlll-bonsai|xlll-clock|xlll-aquarium|xlll-matrix)$

windowrule = opacity 0.90 override 0.90 override, match:class ^(xlll-bonsai)$
windowrule = opacity 0.72 override 0.72 override, match:class ^(xlll-clock)$
windowrule = opacity 0.62 override 0.62 override, match:class ^(xlll-aquarium)$
windowrule = opacity 0.58 override 0.58 override, match:class ^(xlll-matrix)$
